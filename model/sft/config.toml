# Flash SFT config for ToronTwin persona opinions (AGENTS.md 5.1 / HANDOFF).
# Before train: flash env push --name persona-env model/sft
# then paste the returned id into [environment].id below.
# Cost gate: flash train model/sft/config.toml --cost  (wait for human approval)

model = "Qwen/Qwen2.5-7B-Instruct"
model_policy = "allow"  # Qwen2.5-7B not in Flash default list; open-model policy
algorithm = "sft"
seed = 42

[environment]
id = "torontwin/persona-env"

[train]
epochs = 3
max_examples = 30000
lora_rank = 32
lora_alpha = 64
